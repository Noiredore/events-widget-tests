- name: Install Python dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt

- name: Install system dependencies for Playwright (Ubuntu 24.04 fix)
  run: |
    sudo apt-get update
    sudo apt-get install -y \
      libnss3 \
      libatk-bridge2.0-0t64 \
      libxss1 \
      libasound2t64 \
      libgbm1 \
      libgtk-3-0t64 \
      libxshmfence-dev \
      libxrandr2 \
      libxcomposite1 \
      libxcursor1 \
      libxdamage1 \
      libxi6

- name: Install Playwright browsers
  run: python -m playwright install

- name: Run tests
  run: pytest
